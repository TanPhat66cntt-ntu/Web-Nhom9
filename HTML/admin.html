<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <!-- Kết nối CSS -->
    <link rel="stylesheet" href="../CSS/admin.css">
    <!-- Kết nối JS -->
      <script src="../JS/admin.js" defer></script>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- TOAST -->
<div class="toast-noti" id="toast"></div>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="sidebar-logo w-75">
        <img src="../imgs/Logo/Logo dọc.png" alt="Logo">
        <span>Quản trị viên</span>
    </div>
    <div class="sidebar-menu">
        <div class="menu-item active" onclick="showPage('dashboard', this)"> Dashboard</div>
    </div>
    <div class="sidebar-footer">
        <div class="admin-info">
            <img src="../imgs/avatar-mac-dinh-1.jpg" id="sidebarAvatar">
            <div>
                <div class="name" id="sidebarName">Admin</div>
                <div class="role">Quản trị viên</div>
            </div>
        </div>
        <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="content">

        <!-- ===== PAGE: DASHBOARD ===== -->
        <div class="page active" id="page-dashboard">
            <div class="section-title">Tổng quan</div>
            <div class="section-sub">Số liệu hệ thống cập nhật theo thời gian thực</div>

            <!-- Card TỔNG QUAN -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="stat-card d-flex justify-content-between align-items-start">
                        <div>
                            <div class="label">Hôm nay</div>
                            <div class="value" id="statToday">0</div>
                            <div class="sub">lượt truy cập</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card d-flex justify-content-between align-items-start">
                        <div>
                            <div class="label">Hôm qua</div>
                            <div class="value" id="statYesterday">0</div>
                            <div class="sub">lượt truy cập</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card d-flex justify-content-between align-items-start">
                        <div>
                            <div class="label">Tuần này</div>
                            <div class="value" id="statWeek">0</div>
                            <div class="sub">lượt truy cập</div>
                        </div>
                        
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card d-flex justify-content-between align-items-start">
                        <div>
                            <div class="label">Tổng bài học</div>
                            <div class="value" id="statLessons">0</div>
                            <div class="sub">bài đang có</div>
                        </div>
                        
                    </div>
                </div>
            </div>

            <!-- Chart + Top Lessons -->
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="chart-card">
                        <h6> Lượt truy cập trong tuần</h6>
                        <canvas id="weekChart" height="120"></canvas>
                        <div class="text-end mt-2" style="font-size:12px;color:red;">
                            Tổng tuần này: <strong id="weekTotal">0</strong> lượt
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="chart-card h-100">
                        <h6>Bài học được xem nhiều nhất</h6>
                        <div id="topLessons"></div>
                    </div>
                </div>
            </div>
        </div>
    </div><!-- /content -->
</div><!-- /main -->
</body>
</html>
