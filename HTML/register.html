<body>
        <!-- Header -->
    
    <nav class="navbar bg-body-tertiary custom-nav ">
      <div class="container-fluid">
        <div class="navbar-brand d-flex align-items-center">
          <!-- Gộp class lại với nhau, bỏ height cố định để tự động co giãn theo tỷ lệ -->
          <a href="Trangchu.html">
        <img src="../imgs/Logo/Logo ngang.png" alt="Logo" class="me-3" style="height: 50px;">
          </a>
          <span class="fw-bold title">ĐĂNG KÝ</span>
        </div>
      </div>
    </nav>
     <!-- End Header -->

     <!-- MAIN  -->
          <div class=" d-flex align-items-center h-100 ">
            <div class="container h-100">
              <div class="row d-flex justify-content-center align-items-center h-100">  
                <div class="col-12 col-md-7 col-lg-6 col-xl-5 mt-4 mb-4">
                  <div class="card" style="border-radius: 15px;">
                    <div class="card-body p-5">
                      <h2 class="text-uppercase text-center mb-5">Đăng ký</h2>

                      <form>

                        <div data-mdb-input-init class="form-outline mb-4">
                            <label class="form-label" title="UserName">Tên đăng nhập</label>
                          <input type="text" id="UserName" class="form-control form-control-lg" />
                        </div>

                        <div data-mdb-input-init class="form-outline mb-4">
                          <label class="form-label" title="Email">Email</label>
                          <input type="email" id="Email" class="form-control form-control-lg" />
                          
                        </div>

                        <div data-mdb-input-init class="form-outline mb-4">
                          <label class="form-label" title="PassWord">Mật khẩu</label>
                          <input type="password" id="PassWord" class="form-control form-control-lg" />
                          
                        </div>

                        <div data-mdb-input-init class="form-outline mb-4">
                          <label class="form-label" title="RepeatPassWord">Xác nhận mật khẩu</label>  
                          <input type="password" id="RepeatPassWord" class="form-control form-control-lg" />
                          
                        </div>

                        <div class="form-check d-flex justify-content-center mb-5">
                          <input class="form-check-input me-2" type="checkbox" value="" />
                          <label class="form-check-label" for="service">
                            I agree all statements in <a href="#!" class="text-body"><u>Terms of service</u></a>
                          </label>
                        </div>

                        <div class="d-flex justify-content-center">
                          <button id="btn-Register" type="button" class="btn btn-success btn-block btn-lg gradient-custom-4" style="color: #fff;">Đăng ký</button>
                        </div>

                        <!-- thêm dòng chữ khi đăng ký tài khoản thành công -->
                        <div id="Message" class="text-success mt-3"></div>
                        <p class="text-center text-muted mt-5 mb-0">Đã có tài khoản? <a href="login.html"
                            class="fw-bold text-body"><u>Đăng nhập</u></a></p>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

                    <h4>Liên hệ với chúng tôi</h4>

                        <a href="#"><img src="../imgs/Github.jpg" width="40" alt="Github"></a>

                </div>
